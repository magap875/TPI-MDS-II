<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../css/estilos.css">
    <script src= "/js/registrarse.js" defer>  </script>
    <title>Registro</title>
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg border-bottom">
            <div class="container-fluid">
                <a class="navbar-brand" href="#"><img style="width: 7.5rem; margin: 0.5rem 0 0.5rem 7rem;"
                        src="/img/logo.png" alt="logo-body-painting"></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav">
                        <a class="nav-link" href="#"><i class="fa-solid fa-magnifying-glass"></i></a>
                        <a class="nav-link" href="#"><i class="fa-solid fa-user"></i></a>
                        <a class="nav-link" href="#"><i class="fa-solid fa-cart-shopping"></i></a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <form action="" id="form-registro" class="form-registro-container">
            <div class="container mt-4">
                <h2 class="text-center mb-4 form-registro-title">Registrarse</h2>
                <div class="row g-2">
                    <div class="col-md">
                        <div class="form-floating">
                            <input type="text" name="nombre" class="form-control" id="floatingInputGrid" required><label
                                for="floatingInputGrid">Nombre</label>
                        </div>
                    </div>

                    <div class="col-md">
                        <div class="form-floating mb-3">
                            <input type="text" name="apellido" class="form-control" id="floatingInputGrid" required><label
                                for="floatingInputGrid">Apellido</label>
                        </div>
                    </div>
                </div>

                <div class="col-md">
                    <div class="form-floating mb-3">
                        <input type="email" name="email" class="form-control" id="floatingInput"  required><label
                            for="floatingInput">Email</label>
                    </div>
                </div>

                <div class="row g-2">
                    <div class="col-md">
                        <div class="form-floating">
                            <input type="text" name="dni" class="form-control" id="floatingInputGrid"  required><label
                                for="floatingInputGrid">DNI</label>
                        </div>
                    </div>

                    <div class="col-md">
                        <div class="form-floating mb-3">
                            <input type="text" name="telefono" class="form-control" id="floatingInputGrid" required><label
                                for="floatingInputGrid">Teléfono</label>
                        </div>
                    </div>
                </div>

                <div class="row g-2">                                              
                    <div class="col-md">
                        <div class="form-floating">
                            <input type="text" name="pais" class="form-control" id="floatingInputGrid" required><label
                                for="floatingInputGrid">País</label>
                        </div>
                    </div>

                    <div class="col-md">
                        <div class="form-floating mb-3">
                            <input type="text" name="provincia" class="form-control" id="floatingInputGrid" required><label
                                for="floatingInputGrid">Provincia</label>
                        </div>
                    </div>
                </div>

                <div class="col-md">
                    <div class="form-floating mb-3">
                        <input type="text" name="localidad" class="form-control" id="floatingInput" required><label
                            for="floatingInput">Localidad</label>
                    </div>
                </div>

                <div class="row g-2">
                    <div class="col-md">
                        <div class="form-floating">
                            <input type="text" name="calle" class="form-control" id="floatingInputGrid" required><label
                                for="floatingInputGrid">Calle</label>
                        </div>
                    </div>

                    <div class="col-md">
                        <div class="form-floating mb-3">
                            <input type="text" name="numero" class="form-control" id="floatingInputGrid" required><label
                                for="floatingInputGrid">Número</label>
                        </div>
                    </div>
                </div>

                <div class="row g-2">
                    <div class="col-md">
                        <div class="form-floating">
                            <input type="number" name="piso" class="form-control" id="piso"><label
                                for="floatingInputGrid">Piso</label>
                        </div>
                    </div>

                    <div class="col-md">
                        <div class="form-floating mb-3">
                            <input type="number" name="departamento" class="form-control" id="departamento"><label
                                for="floatingInputGrid">Departamento</label>
                        </div>
                    </div>
                </div>

                <div class="g-2 form-registro-rol">
                    <h6>Rol</h6>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio1"
                            value="Cliente"  required>
                        <label class="form-check-label" for="inlineRadio1">Cliente</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio2"
                            value="Administrador"  required>
                        <label class="form-check-label" for="inlineRadio2">Administrador</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="inlineRadioOptions" id="vendedor"
                            value="Vendedor" disabled>
                        <label class="form-check-label" for="inlineRadio3">Vendedor</label>
                    </div>
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn form-registro-btn">
                        Registrarse
                    </button>
                </div>
            </div>
            </div>
        </form>
    </main>

    <footer class="border-top">
        <img src="/img/logo.png" alt="logo-body-painting">
        <p>&copy; 2025 Body Painting. Todos los derechos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
</body>

</html>
