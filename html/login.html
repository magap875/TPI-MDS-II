<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../css/estilos.css">
    <title>Login</title>
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg border-bottom">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <img style="width: 7.5rem; margin: 0.5rem 0 0.5rem 7rem;" src="../img/logo.png"
                        alt="logo-body-painting">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavAltMarkup">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav">
                        <a class="nav-link" href="#"><i class="fa-solid fa-magnifying-glass"></i></a>
                        <a class="nav-link" href="#"><i class="fa-solid fa-user"></i></a>
                        <a class="nav-link" href="#"><i class="fa-solid fa-cart-shopping"></i></a>
                    </div>
                </div>
            </div>
        </nav>

    </header>

    <main>
        <form class="form-registro-container">
            <div class="container mt-4">
                <h2 class="text-center mb-4 form-registro-title">
                    Iniciar Sesión
                </h2>
                <!-- BOTONES DE ROL -->
                <div class="g-2 form-registro-rol">
                    <div class="opciones">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio1"
                                value="option1">
                            <label class="form-check-label" for="inlineRadio1">Cliente</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio2"
                                value="option2">
                            <label class="form-check-label" for="inlineRadio2">Administrador</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio3"
                                value="option3" disabled>
                            <label class="form-check-label" for="inlineRadio3">Vendedor</label>
                        </div>
                    </div>
                </div>
                <!-- BOTÓN INGRESAR -->
                <div class="d-grid mt-3">
                    <button type="submit" class="btn form-registro-btn">
                        Ingresar
                    </button>
                </div>
                <!-- LINK REGISTRO -->
                <p class="text-center mt-2">
                    <a href="registrarse.html" class="text-dark text-decoration-none cuenta">
                        No tengo cuenta
                    </a>
                </p>
            </div>
        </form>
    </main>

    <footer class="border-top">
        <img src="../img/logo.png" alt="logo-body-painting">
        <p>&copy; 2025 Body Painting. Todos los derechos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
