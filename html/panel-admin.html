<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script defer src="/TPI-MDS-II/js/registrarProducto.js" ></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Registrar Producto</title>
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow p-4">

            <h2 class="text-center mb-4">Registrar Producto</h2>

            <form id="registroProducto" name="registroProducto" action="#" method="post" enctype="multipart/form-data">

                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre del producto</label>
                    <input type="text" class="form-control" id="nombre" name="nombre" required>
                </div>

                <div class="mb-3">
                    <label for="precio" class="form-label">Precio</label>
                    <input type="number" class="form-control" id="precio" name="precio" min="0" step="1" required>
                </div>

                <div class="mb-3">
                    <label for="marca" class="form-label">Marca</label>
                    <input type="text" class="form-control" id="marca" name="marca" required>
                </div>

                <div class="mb-3">
                    <label for="stock" class="form-label">Stock</label>
                    <input type="number" class="form-control" id="stock" name="stock" min="0" step="1" required>
                </div>

                <div class="mb-3">
                    <label for="imagen" class="form-label">URL de la imagen</label>
                    <input type="url" class="form-control" id="imagen" name="imagen"
                        placeholder="https://ejemplo.com/imagen.jpg" required>
                </div>

                <div class="d-grid">
                    <button id="btnRegistrar" type="submit" class="btn btn-primary">Registrar producto</button>
                </div>

            </form>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
