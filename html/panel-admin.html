<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Admin</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>

<div class="container mt-5">

    <!-- PANEL PRINCIPAL -->
    <div class="panel-admin shadow-lg p-4">

        <h2 class="text-center mb-4">Panel de Admin</h2>

        <div class="row g-4">

            <!-- FORMULARIO -->
            <div class="col-md-6">
                <div class="registro p-4 h-100">

                    <h5 class="text-center mb-4">Registro de Producto</h5>

                    <form action="#" method="post">

                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" name="nombre" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Precio</label>
                            <input type="number" name="precio" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Stock</label>
                            <input type="number" name="stock" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Categoría</label>
                            <input type="text" name="categoria" class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">URL Imagen</label>
                            <input type="text" name="imagen" class="form-control">
                        </div>

                        <button type="submit" class="btn btn-violeta w-100">
                            Agregar producto
                        </button>

                    </form>

                </div>
            </div>

            <!-- PREVIEW -->
            <div class="col-md-6">
                <div class="preview p-4 h-100 text-center">

                    <h5 class="mb-4">Vista Previa</h5>

                    <div class="img-preview mb-3"></div>

                    <p class="fw-bold mb-1">Nombre producto</p>
                    <p class="text-muted mb-1">Precio</p>
                    <p class="text-muted">Stock</p>

                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
