<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="../js/panel-admin.js" type="module">  </script>
    <title>Panel de Admin</title>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg border-bottom">
            <div class="container-fluid">
                <a class="navbar-brand" href="#"><img style="width: 7.5rem; margin: 0.5rem 0 0.5rem 7rem;"
                        src="/img/logo.png" alt="logo-body-painting"></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav">
                        <a class="nav-link" href="#"><i class="fa-solid fa-user"></i></a>
                        <a class="nav-link" href="#"><i class="fa-solid fa-cart-shopping"></i></a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container mt-5">
            <!-- PANEL PRINCIPAL -->
            <div class="panel-admin shadow-lg p-4">
                <h2 class="text-center mb-4 fw-bold">Panel Administrador</h2>
                <div class="row g-4">
                    <!-- FORMULARIO -->
                    <div class="col-md-6">
                        <div class="registro p-4 h-100">
                            <h2 class="text-center mb-4 form-registro-title">Alta de productos</h2>
                            <form action="#" name="registroProducto" method="post">

                                <div class="mb-3 form-floating">
                                    <input type="text" name="nombre" class="form-control" id="nombre" required><label
                                        for="nombre">Nombre</label>
                                </div>

                                <div class="mb-3 form-floating">
                                    <input type="number" name="precio" min="1" class="form-control" id="precio" required><label
                                        for="precio">Precio</label>
                                </div>

                                <div class="mb-3 form-floating">
                                    <input type="text" name="marca" min="1" class="form-control" id="marca" required><label
                                        for="marca">Marca</label>
                                </div>
                                <div class="mb-3 form-floating">
                                    <input type="number" name="stock" min="1" class="form-control" id="stock" required><label
                                        for="stock">Stock</label>
                                </div>

                                <div class="mb-3 form-floating">
                                    <input type="file" name="imagen" class="form-control" accept=".jpg,.jpeg,.png"
                                        id="imagen" required><label for="imagen">Tipo PNG o JPG</label>
                                </div>

                                <button type="submit" name="btnRegistrar" class="btn btn-violeta w-100">
                                    Agregar producto
                                </button>
                            </form>
                        </div>
                    </div>

                    <!-- PREVIEW -->
                    <div class="col-md-6">
                        <div class="preview p-4 h-100">
                            <h5 class="mb-4 text-center">Vista previa</h5>

                            <div class="preview-card">
                                <div class="img-preview"></div>

                                <div class="preview-body text-center mt-3">
                                    <p class="fw-bold mb-1" id="preview-nombre">Nombre producto</p>
                                    <p class="text-muted mb-1" id="preview-precio">Precio</p>
                                    <p class="text-muted mb-1" id="preview-marca">Marca</p>
                                    <p class="text-muted" id="preview-stock">Stock</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <hr>
                <div class="container mt-4">
                    <h3 class="mb-3">Productos cargados</h3>
                    <input type="text" id="filtro-productos" class="form-control mb-3" placeholder="Buscar producto por nombre...">
                    <div id="contenedor-productos" class="row g-4"></div>
                </div>
            </div>
        </div>


    </main>

    <footer class="border-top">
        <img src="/img/logo.png" alt="logo-body-painting">
        <p>&copy; 2025 Body Painting. Todos los derechos reservados.</p>
    </footer>
</body>

</html>
